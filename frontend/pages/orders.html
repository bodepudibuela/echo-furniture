<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders — Echo Furniture</title>
  <link rel="stylesheet" href="../styles/main.css"/>
  <style>
    .order-card { background:white; border-radius:12px; box-shadow:var(--shadow-sm); margin-bottom:20px; overflow:hidden; border:1px solid var(--beige); transition:var(--transition); }
    .order-card:hover { box-shadow:var(--shadow-md); }
    .order-card-header { padding:20px 24px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; background:var(--cream); border-bottom:1px solid var(--beige); }
    .order-meta { display:flex; gap:32px; flex-wrap:wrap; gap:16px; }
    .order-meta-item { }
    .order-meta-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--warm-gray); margin-bottom:2px; }
    .order-meta-value { font-size:0.9rem; font-weight:600; color:var(--dark); }
    .order-card-items { padding:20px 24px; }
    .order-product-row { display:flex; align-items:center; gap:14px; padding:10px 0; border-bottom:1px solid var(--beige); }
    .order-product-row:last-child { border-bottom:none; }
    .order-product-img { width:56px; height:48px; object-fit:cover; border-radius:6px; background:var(--cream); flex-shrink:0; }
    .order-product-name { flex:1; font-size:0.88rem; font-weight:500; }
    .order-product-qty { font-size:0.78rem; color:var(--warm-gray); }
    .order-product-price { font-size:0.9rem; font-weight:600; }
    .order-card-footer { padding:16px 24px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; border-top:1px solid var(--beige); }
    .order-total-label { font-size:0.85rem; color:var(--warm-gray); }
    .order-total-amount { font-size:1.1rem; font-weight:700; color:var(--dark); }
    .order-actions { display:flex; gap:10px; }

    .tracking-steps { display:flex; align-items:center; padding:16px 24px; border-bottom:1px solid var(--beige); overflow-x:auto; }
    .tracking-step { display:flex; flex-direction:column; align-items:center; min-width:80px; }
    .tracking-dot { width:28px; height:28px; border-radius:50%; border:2px solid var(--beige); background:white; display:flex; align-items:center; justify-content:center; font-size:0.7rem; transition:var(--transition); }
    .tracking-dot.done { background:var(--success); border-color:var(--success); color:white; }
    .tracking-dot.current { background:var(--accent); border-color:var(--accent); color:white; }
    .tracking-line { flex:1; height:2px; background:var(--beige); min-width:32px; margin:0; }
    .tracking-line.done { background:var(--success); }
    .tracking-label { font-size:0.65rem; color:var(--warm-gray); margin-top:6px; text-align:center; white-space:nowrap; }
    .tracking-label.current { color:var(--accent); font-weight:500; }
    .tracking-label.done { color:var(--success); }

    .filter-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
    .filter-tab-btn { padding:8px 18px; border:1.5px solid var(--beige); border-radius:100px; font-size:0.82rem; color:var(--charcoal); transition:var(--transition); }
    .filter-tab-btn:hover { border-color:var(--dark); }
    .filter-tab-btn.active { background:var(--dark); color:white; border-color:var(--dark); }
  </style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="page-wrapper">
  <div class="page-header">
    <div class="container">
      <div class="breadcrumb" style="margin-bottom:12px;"><a href="../index.html">Home</a><span>/</span><a href="./profile.html">Account</a><span>/</span><span>My Orders</span></div>
      <h1>My Orders</h1>
    </div>
  </div>

  <div class="container" style="padding-bottom:80px;">
    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <button class="filter-tab-btn active" onclick="filterOrders('', this)">All Orders</button>
      <button class="filter-tab-btn" onclick="filterOrders('pending', this)">Pending</button>
      <button class="filter-tab-btn" onclick="filterOrders('confirmed', this)">Confirmed</button>
      <button class="filter-tab-btn" onclick="filterOrders('shipped', this)">Shipped</button>
      <button class="filter-tab-btn" onclick="filterOrders('delivered', this)">Delivered</button>
      <button class="filter-tab-btn" onclick="filterOrders('cancelled', this)">Cancelled</button>
    </div>

    <div id="ordersLoading"><div class="spinner"></div></div>
    <div id="ordersList"></div>
    <div class="pagination" id="ordersPagination"></div>
  </div>
</div>

<!-- Order Detail Modal -->
<div class="modal-overlay" id="orderModal" style="display:none;">
  <div class="modal" style="max-width:680px;">
    <div class="modal-header">
      <h2 class="modal-title" id="modalOrderNum">Order Details</h2>
      <button class="modal-close" onclick="closeOrderModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div id="footer"></div>
<script src="../scripts/main.js"></script>
<script>
  if (!auth.isLoggedIn()) window.location.href = './login.html';

  let currentStatus = '';
  let currentPage = 1;

  const statusSteps = ['confirmed', 'processing', 'shipped', 'delivered'];

  async function loadOrders() {
    try {
      const q = new URLSearchParams({ page: currentPage, limit: 5 });
      if (currentStatus) q.set('status', currentStatus);
      const data = await api.get(`/orders?${q}`);
      document.getElementById('ordersLoading').style.display = 'none';

      if (!data.orders.length) {
        document.getElementById('ordersList').innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <h3>No orders found</h3>
            <p>${currentStatus ? `No ${currentStatus} orders` : 'You haven\'t placed any orders yet'}</p>
            <a href="./products.html" class="btn btn-primary">Start Shopping</a>
          </div>`;
        document.getElementById('ordersPagination').innerHTML = '';
        return;
      }

      document.getElementById('ordersList').innerHTML = data.orders.map(renderOrderCard).join('');
      renderPagination(data.pagination);
    } catch (err) {
      document.getElementById('ordersLoading').innerHTML = `<p style="color:var(--error);text-align:center;">${err.message}</p>`;
    }
  }

  function renderOrderCard(order) {
    const addr = typeof order.shipping_address === 'string' ? JSON.parse(order.shipping_address || '{}') : (order.shipping_address || {});
    const stepIndex = statusSteps.indexOf(order.status);

    const trackingHtml = `
      <div class="tracking-steps">
        ${statusSteps.map((step, i) => {
          const isDone = i < stepIndex || order.status === 'delivered';
          const isCurrent = step === order.status && order.status !== 'delivered';
          return `
            ${i > 0 ? `<div class="tracking-line ${i <= stepIndex ? 'done' : ''}"></div>` : ''}
            <div class="tracking-step">
              <div class="tracking-dot ${isDone ? 'done' : isCurrent ? 'current' : ''}">
                ${isDone ? '✓' : i+1}
              </div>
              <div class="tracking-label ${isCurrent ? 'current' : isDone ? 'done' : ''}">${step.charAt(0).toUpperCase()+step.slice(1)}</div>
            </div>
          `;
        }).join('')}
      </div>
    `;

    const canCancel = ['pending','confirmed'].includes(order.status);

    return `
      <div class="order-card">
        <div class="order-card-header">
          <div class="order-meta">
            <div class="order-meta-item">
              <div class="order-meta-label">Order Number</div>
              <div class="order-meta-value">${order.order_number}</div>
            </div>
            <div class="order-meta-item">
              <div class="order-meta-label">Date</div>
              <div class="order-meta-value">${fmt.date(order.created_at)}</div>
            </div>
            <div class="order-meta-item">
              <div class="order-meta-label">Amount</div>
              <div class="order-meta-value">${fmt.price(order.total_amount)}</div>
            </div>
            <div class="order-meta-item">
              <div class="order-meta-label">Payment</div>
              <div class="order-meta-value" style="text-transform:capitalize;">${(order.payment_method||'').replace(/_/g,' ')}</div>
            </div>
          </div>
          <span class="status-badge status-${order.status}">${order.status.charAt(0).toUpperCase()+order.status.slice(1)}</span>
        </div>

        ${!['pending','cancelled','refunded'].includes(order.status) ? trackingHtml : ''}

        <div class="order-card-footer">
          <div>
            <div class="order-total-label">Delivering to: ${addr.city || '—'}, ${addr.state || ''}</div>
            ${order.estimated_delivery ? `<div style="font-size:0.78rem;color:var(--warm-gray);">Est. delivery: ${fmt.date(order.estimated_delivery)}</div>` : ''}
          </div>
          <div class="order-actions">
            <button class="btn btn-ghost btn-sm" onclick="viewOrderDetail(${order.id})">View Details</button>
            ${canCancel ? `<button class="btn btn-danger btn-sm" onclick="cancelOrder(${order.id})">Cancel</button>` : ''}
            ${order.status === 'delivered' ? `<a href="./product-detail.html" class="btn btn-outline btn-sm">Re-order</a>` : ''}
          </div>
        </div>
      </div>
    `;
  }

  function renderPagination({ total, page, pages }) {
    const el = document.getElementById('ordersPagination');
    if (pages <= 1) { el.innerHTML = ''; return; }
    let html = `<button class="page-btn ${page===1?'disabled':''}" onclick="goPage(${page-1})">‹</button>`;
    for (let i=1;i<=pages;i++) html += `<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
    html += `<button class="page-btn ${page===pages?'disabled':''}" onclick="goPage(${page+1})">›</button>`;
    el.innerHTML = html;
  }

  function goPage(n) { currentPage = n; loadOrders(); window.scrollTo({top:200,behavior:'smooth'}); }

  function filterOrders(status, btn) {
    currentStatus = status;
    currentPage = 1;
    document.querySelectorAll('.filter-tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('ordersLoading').style.display = 'block';
    document.getElementById('ordersList').innerHTML = '';
    loadOrders();
  }

  async function viewOrderDetail(id) {
    try {
      const data = await api.get(`/orders/${id}`);
      const o = data.order;
      const addr = typeof o.shipping_address === 'string' ? JSON.parse(o.shipping_address || '{}') : (o.shipping_address || {});
      document.getElementById('modalOrderNum').textContent = `Order #${o.order_number}`;
      document.getElementById('modalBody').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
          <div>
            <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--warm-gray);margin-bottom:6px;">Delivery Address</div>
            <div style="font-size:0.875rem;line-height:1.7;">${addr.full_name}<br>${addr.phone}<br>${addr.address_line1}${addr.address_line2?', '+addr.address_line2:''}<br>${addr.city}, ${addr.state} ${addr.postal_code}</div>
          </div>
          <div>
            <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--warm-gray);margin-bottom:6px;">Order Info</div>
            <div style="font-size:0.875rem;line-height:1.9;">Status: <span class="status-badge status-${o.status}">${o.status}</span><br>Payment: ${(o.payment_method||'').replace(/_/g,' ')}<br>Placed: ${fmt.date(o.created_at)}</div>
          </div>
        </div>
        <div style="margin-bottom:20px;">
          ${data.items.map(item => `
            <div class="order-product-row">
              <img src="${item.product_image||''}" class="order-product-img" onerror="this.style.display='none'">
              <div class="order-product-name">${item.product_name}</div>
              <div class="order-product-qty">×${item.quantity}</div>
              <div class="order-product-price">${fmt.price(item.total_price)}</div>
            </div>
          `).join('')}
        </div>
        <div style="background:var(--cream);border-radius:8px;padding:16px;">
          <div class="summary-row"><span>Subtotal</span><span>${fmt.price(o.subtotal)}</span></div>
          <div class="summary-row"><span>Tax</span><span>${fmt.price(o.tax_amount)}</span></div>
          <div class="summary-row"><span>Shipping</span><span>${o.shipping_amount == 0 ? 'FREE' : fmt.price(o.shipping_amount)}</span></div>
          ${o.discount_amount > 0 ? `<div class="summary-row"><span style="color:var(--success)">Discount</span><span style="color:var(--success)">-${fmt.price(o.discount_amount)}</span></div>` : ''}
          <div class="summary-row total"><span>Total</span><span>${fmt.price(o.total_amount)}</span></div>
        </div>
      `;
      document.getElementById('orderModal').style.display = 'flex';
    } catch (err) { toast.error(err.message); }
  }

  function closeOrderModal() { document.getElementById('orderModal').style.display = 'none'; }

  async function cancelOrder(id) {
    if (!confirm('Are you sure you want to cancel this order?')) return;
    try {
      await api.put(`/orders/${id}/cancel`);
      toast.success('Order cancelled successfully');
      loadOrders();
    } catch (err) { toast.error(err.message); }
  }

  loadOrders();
</script>
</body>
</html>
